    <title>作品詳情 ｜ Detail</title>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        /* 一致的玻璃擬物化主題背景 */
        :root {
            --bg-gradient: linear-gradient(135deg, #ffeef8 0%, #e2e8f0 100%);
            --text-color: #2d3748;
            --card-bg: rgba(255, 255, 255, 0.5);
            --card-border: rgba(255, 255, 255, 0.7);
            --accent-color: #b48a8a; 
        }

        /* ⚡ 修正：同步將 data-theme 綁定在 html 根節點上確保防閃生效 */
        html[data-theme="dark"], body[data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #1a103c 100%);
            --text-color: #f8fafc;
            --card-bg: rgba(13, 17, 30, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-color: #6366f1; 
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .navbar-custom {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        /* 大圖展示框架 */
        .main-img-container {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background: rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.25s ease;
        }

        /* 縮圖展示橫列 */
        .thumb-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .thumb-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            opacity: 0.6;
        }
        .thumb-img:hover {
            opacity: 0.9;
        }
        .thumb-img.active {
            border-color: var(--accent-color);
            opacity: 1;
            transform: scale(1.05);
        }

        .info-label {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.05rem;
            display: inline-block;
            width: 100px;
        }
    </style>

                        thumb.classList.add('thumb-img');

                                mainImg.style.opacity = '1';

                document.documentElement.setAttribute('data-theme', 'dark');
                document.body.setAttribute('data-theme', 'dark');
                if(themeToggle) themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.body.removeAttribute('data-theme');
                if(themeToggle) themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        };

        const currentSavedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(currentSavedTheme);

        if(themeToggle) {
            themeToggle.addEventListener('click', () => {

<div id="pureLightbox" onclick="this.style.display='none'" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 999999; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(10px);">

</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // 設定一秒鐘地毯式搜尋，等網頁所有圖片和背景都載入完畢
        setTimeout(() => {
            // 抓取網頁上可能用來當大圖的所有常見殼子（包含你的 main-image）
            const allPossibleBlocks = document.querySelectorAll('#main-image, .product-image, .main-product-img, .product-image-container');
            
            allPossibleBlocks.forEach(block => {
                block.style.cursor = 'zoom-in'; // 讓滑鼠移過去強制變成放大鏡
                
                block.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    let finalSrc = "";
                    
                    // 偵測法 A：如果它是用背景圖 style="background-image: url(...)"
                    let bg = window.getComputedStyle(this).backgroundImage;
                    if (bg && bg !== 'none') {
                        finalSrc = bg.replace(/url\(['"]?(.*?)['"]?\)/i, '$1');
                    }
                    
                    // 偵測法 B：如果它肚子裡面藏有 <img> 標籤
                    let innerImg = this.querySelector('img');
                    if (innerImg) {
                        finalSrc = innerImg.src;
                    }
                    
                    // 如果成功抓到任何圖片網址，就直接塞進去強行打開！
                    if (finalSrc && finalSrc !== window.location.href) {
                        const lightbox = document.getElementById('pureLightbox');
                        const lightboxImg = document.getElementById('pureLightboxImg');
                        lightboxImg.src = finalSrc;
                        lightbox.style.display = 'flex';
                    }
                });
            });
        }, 1000); // 延遲 1 秒，保證安全無誤
    });
</script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // 🎯 核心修正：拿掉 300 毫秒的延遲，改成 0，讓提示字秒開、不等待！
        setTimeout(() => {
            // 鎖定作品大圖 id="detailImage"
            const mainImg = document.getElementById('detailImage');
            if (mainImg) {
                mainImg.style.cursor = 'zoom-in';
                
                // 💡 建立一個漂亮的提示小標籤
                const hintDiv = document.createElement('div');
                hintDiv.className = 'text-center mb-1'; 
                
                // 調校了內襯、去掉了導致間距過大的 margin-top
                hintDiv.innerHTML = `
                    <span class="badge rounded-pill bg-secondary bg-opacity-10 text-secondary px-3 py-1.5" style="font-size: 0.82rem; letter-spacing: 1px; border: 1px solid rgba(0,0,0,0.03); color: var(--text-color) !important; display: inline-block;">
                        <i class="fas fa-search-plus me-1"></i> 點擊下方圖片可放大觀看
                    </span>
                `;
                
                // 找到大圖的外殼框架，並把提示字塞到外殼的正上方
                const imgContainer = mainImg.closest('.main-img-container') || mainImg;
                imgContainer.parentNode.insertBefore(hintDiv, imgContainer);
                
                mainImg.addEventListener('click', function(e) {
                    const lightbox = document.getElementById('pureLightbox');
                    const lightboxImg = document.getElementById('pureLightboxImg');
                    lightboxImg.src = this.src;
                    lightbox.style.display = 'flex';
                });
            }
        }, 0); // ⚡ 這裡改成 0 毫秒了！
    });
</script>
